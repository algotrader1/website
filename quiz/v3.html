<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#faf8f4;--bg2:#ffffff;--bg3:#f2efea;
  --text:#1a1714;--text2:#5c554d;--text3:#9a928a;
  --green:#2eaa60;--green-dark:#259950;--green-light:rgba(46,170,96,0.08);
  --red:#dc4a4a;--orange:#d4a030;--blue:#5b6abf;
  --border:#e4dfd8;--border2:rgba(46,170,96,0.3);
  --accent:#2eaa60;--purple:#5b6abf;--purple-glow:rgba(91,106,191,0.08);
  --shadow-sm:0 1px 3px rgba(0,0,0,0.06);
  --shadow-md:0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg:0 8px 24px rgba(0,0,0,0.1);
  --radius-sm:12px;--radius-md:16px;--radius-lg:20px;--radius-xl:24px;
}
body{font-family:'Plus Jakarta Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden;line-height:1.6;font-weight:450;letter-spacing:-0.01em}
.serif{font-family:'Instrument Serif',Georgia,serif}

/* Progress bar */
.progress-wrap{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--bg);padding:10px 16px 8px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.progress-bar-bg{flex:1;height:5px;background:rgba(0,0,0,0.06);border-radius:3px;overflow:hidden}
.progress-bar-fill{height:100%;background:var(--green);border-radius:3px;transition:width 0.4s ease}
.progress-count{font-size:13px;color:var(--text3);font-weight:600;white-space:nowrap}
.back-btn{position:fixed;top:8px;left:4px;z-index:101;background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;padding:10px;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center}

/* Container */
.container{max-width:440px;margin:0 auto;min-height:100dvh;padding:56px 20px 40px;display:flex;flex-direction:column}

/* Screens */
.screen{display:none;flex-direction:column;flex:1;animation:fadeIn 0.35s ease}
.screen.active{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes optionSelect{0%{border-color:var(--green);background:rgba(46,170,96,0.06);transform:scale(1)}50%{transform:scale(0.97)}100%{border-color:var(--green);background:rgba(46,170,96,0.06);transform:scale(1)}}
.freq3-opt.just-selected,.option-card.just-selected{animation:optionSelect 0.3s ease;border-color:var(--green)!important;background:rgba(46,170,96,0.06)!important}

/* Landing */
.landing{justify-content:center;align-items:center;text-align:center;gap:24px;padding-top:40px}
.landing-badge{background:var(--green-light);color:var(--green);font-size:11px;font-weight:700;padding:6px 16px;border-radius:20px;letter-spacing:0.5px;text-transform:uppercase}
.landing h1{font-size:28px;font-weight:800;line-height:1.3;max-width:340px;letter-spacing:-0.3px;color:var(--text)}
.landing .sub{font-size:15px;color:var(--text2);line-height:1.6;max-width:320px}
.gender-cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;max-width:340px}
.gender-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:0;text-align:center;cursor:pointer;transition:all 0.25s;display:flex;flex-direction:column;align-items:center;gap:0;overflow:hidden;box-shadow:var(--shadow-md)}
.gender-card:hover{border-color:var(--border2);box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.gender-card:active{transform:scale(0.97)}
.gender-card .photo{width:100%;height:240px;overflow:hidden;position:relative;background:var(--bg3)}
.gender-card .photo img{width:100%;height:100%;object-fit:cover;object-position:top}
.gender-card .g-label{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;width:100%;background:var(--green);color:#fff;font-size:15px;font-weight:700}
.gender-card .g-label::after{content:none}
.landing-legal{font-size:10px;color:var(--text3);text-align:center;line-height:1.5;max-width:300px}
.landing-legal a{color:var(--text2)}

/* Question screens */
.q-screen{padding-top:16px;gap:24px}
.q-title{font-size:22px;font-weight:700;line-height:1.4;color:var(--text)}
.q-title .green{color:var(--green)}
.q-sub{font-size:14px;color:var(--text2);margin-top:-10px}

/* Option cards */
.options{display:flex;flex-direction:column;gap:12px}
.option-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius-md);padding:20px 22px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:14px;min-height:62px;box-shadow:var(--shadow-sm)}
.option-card:hover{background:var(--bg3);border-color:var(--border2)}
.option-card:active{transform:scale(0.98)}
.option-card .opt-icon{flex-shrink:0;width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:10px;background:rgba(46,170,96,0.08)}
.option-card .opt-icon svg{width:20px;height:20px}
.option-card .opt-label{font-size:15px;font-weight:500;line-height:1.45}
.option-card.selected{border-color:var(--green);background:rgba(46,170,96,0.06)}
.option-card.selected .opt-icon{background:rgba(46,170,96,0.15)}

/* freq3 */
.freq3-opts{display:flex;flex-direction:column;gap:12px}
.freq3-opt{background:var(--bg2);border:1.5px solid var(--border);border-radius:14px;padding:22px 24px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm)}
.freq3-opt:hover{background:var(--bg3);border-color:var(--border2)}
.freq3-opt:active{transform:scale(0.98)}
.freq3-opt .f3-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.freq3-opt .f3-label{font-size:17px;font-weight:500}

/* likert5 */
.likert-row{display:flex;justify-content:space-between;gap:8px;margin-top:16px}
.likert-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px 4px 12px;border-radius:14px;border:1.5px solid var(--border);background:var(--bg2);cursor:pointer;transition:all 0.2s;box-shadow:var(--shadow-sm)}
.likert-btn:hover{background:var(--bg3);border-color:var(--border2)}
.likert-btn:active{transform:scale(0.93)}
.likert-btn svg{width:44px;height:44px}
.likert-btn img{width:44px;height:44px;object-fit:contain;border-radius:6px}
.likert-btn .lk-label{font-size:10px;color:var(--text2);text-align:center;line-height:1.25;font-weight:500}

/* multi select */
.multi-opt{position:relative}
.multi-opt .checkbox{width:24px;height:24px;border-radius:7px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0}
.multi-opt.selected .checkbox{background:var(--green);border-color:var(--green)}
.multi-opt.selected .checkbox svg{opacity:1}
.multi-opt .checkbox svg{opacity:0;transition:opacity 0.2s}

/* Continue button */
.btn-continue{background:var(--green);color:#fff;border:none;padding:18px;border-radius:var(--radius-lg);font-size:16px;font-weight:700;cursor:pointer;transition:all 0.25s;text-align:center;width:100%;letter-spacing:0.3px;margin-top:12px;box-shadow:0 4px 16px rgba(46,170,96,0.2)}
.btn-continue:hover{background:var(--green-dark);transform:translateY(-1px)}
.btn-continue:disabled{opacity:0.4;cursor:not-allowed;transform:none}

/* Social proof constellation */
.constellation{position:relative;width:240px;height:240px;margin:0 auto}
.constellation .orbit{position:absolute;border-radius:50%;border:1px dashed rgba(0,0,0,0.08)}
.constellation .orbit-1{width:100%;height:100%;top:0;left:0}
.constellation .orbit-2{width:70%;height:70%;top:15%;left:15%}
.constellation .avatar-dot{position:absolute;width:36px;height:36px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:var(--bg2);box-shadow:var(--shadow-sm);overflow:hidden}
.constellation .avatar-dot img{width:100%;height:100%;object-fit:cover}

/* Science cards */
.science-cards{display:flex;gap:10px;margin-top:12px}
.science-card{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center;box-shadow:var(--shadow-sm)}
.science-card .sc-icon{font-size:24px;margin-bottom:6px}
.science-card .sc-name{font-size:10px;color:var(--text2);line-height:1.3}

/* Quote box */
.quote-box{background:var(--bg2);border-left:3px solid var(--green);border-radius:0 12px 12px 0;padding:16px 18px;margin-top:16px;box-shadow:var(--shadow-sm)}
.quote-box .qb-text{font-size:13px;line-height:1.6;color:var(--text);font-style:italic}
.quote-box .qb-author{font-size:11px;color:var(--text2);margin-top:8px}

/* Expert card */
.expert-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;display:flex;align-items:center;gap:14px;margin-top:16px;box-shadow:var(--shadow-sm)}
.expert-card .exp-photo{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--green-light),rgba(91,106,191,0.08));display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.expert-card .exp-info{font-size:12px;line-height:1.5}
.expert-card .exp-name{font-weight:700;color:var(--text)}
.expert-card .exp-title{color:var(--text2)}

/* World map */
.world-map{position:relative;width:100%;max-width:340px;height:180px;margin:0 auto;background:var(--bg2);border-radius:16px;overflow:hidden;border:1px solid var(--border)}
.world-map .map-dot{position:absolute;width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px rgba(46,170,96,0.4);animation:mapPulse 2s infinite}
@keyframes mapPulse{0%,100%{opacity:0.6;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}

/* Goal options */
.goal-opts{display:flex;flex-direction:column;gap:12px}
.goal-opt{background:var(--bg2);border:1.5px solid var(--border);border-radius:14px;padding:18px 22px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow-sm)}
.goal-opt:hover{background:var(--bg3);border-color:var(--green)}
.goal-opt:active{transform:scale(0.98)}
.goal-opt .go-icon{font-size:20px}
.goal-opt .go-text{font-size:15px;font-weight:500}
.goal-opt .go-sub{font-size:11px;color:var(--text3)}

/* Input fields */
.input-field{width:100%;padding:18px 20px;border-radius:14px;border:1.5px solid var(--border);background:var(--bg2);color:var(--text);font-size:16px;font-family:inherit;outline:none;transition:border-color 0.2s;box-shadow:var(--shadow-sm)}
.input-field:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(46,170,96,0.1)}
.input-field::placeholder{color:var(--text3)}

/* Popup overlay */
.popup-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.3s}
.popup-box{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:32px 24px;max-width:340px;width:calc(100% - 40px);text-align:center;box-shadow:var(--shadow-lg)}
.popup-box .popup-title{font-size:16px;font-weight:700;margin-bottom:8px}
.popup-box .popup-q{font-size:14px;color:var(--text2);margin-bottom:20px;line-height:1.5}
.popup-btns{display:flex;gap:12px;justify-content:center}
.popup-btns button{padding:12px 32px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all 0.2s}
.popup-btn-yes{background:var(--green);color:#fff}
.popup-btn-no{background:var(--bg3);color:var(--text2);border:1px solid var(--border) !important}

/* Loading screen */
.loading-section{margin-bottom:20px}
.loading-label{font-size:14px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:8px;width:100%}
.loading-bar{height:6px;background:rgba(0,0,0,0.06);border-radius:3px;overflow:hidden}
.loading-bar-fill{height:100%;background:var(--green);border-radius:3px;transition:width 0.4s ease}

/* Testimonial card */
.testi-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-md);padding:20px;margin-top:16px;box-shadow:var(--shadow-sm)}
.testi-card .tc-stars{color:#f5c518;font-size:14px;margin-bottom:6px}
.testi-card .tc-text{font-size:13px;line-height:1.6;color:var(--text);font-style:italic}
.testi-card .tc-author{font-size:11px;color:var(--text2);margin-top:8px}

/* Profile summary */
.badge-high{display:inline-block;background:rgba(220,74,74,0.1);color:var(--red);font-size:12px;font-weight:700;padding:4px 12px;border-radius:8px}
.gauge-wrap{position:relative;height:14px;background:rgba(0,0,0,0.06);border-radius:7px;overflow:hidden;margin:12px 0}
.gauge-fill{height:100%;border-radius:7px;width:0}
@keyframes gaugeGrow{from{width:0%}to{width:82%}}
.gauge-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text3)}
.metric-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}
.metric-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;box-shadow:var(--shadow-sm)}
.metric-card .mc-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.metric-card .mc-value{font-size:14px;font-weight:700;color:var(--text)}

/* Chart bars */
.chart-bars{display:flex;align-items:flex-end;gap:8px;height:180px;padding:0 8px;margin-top:16px}
.chart-bar{flex:1;border-radius:8px 8px 0 0;transition:height 1s ease;position:relative;min-width:0}
.chart-bar .cb-label{position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--text3);white-space:nowrap}
.chart-bar .cb-badge{position:absolute;top:-24px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--green);font-weight:700;white-space:nowrap}

/* Scratch card */
.scratch-wrap{position:relative;width:290px;height:175px;margin:20px auto;border-radius:18px;overflow:hidden;border:2px solid var(--green);box-shadow:0 0 30px rgba(46,170,96,0.15),0 0 60px rgba(46,170,96,0.05);background:linear-gradient(135deg,#1a8a4a 0%,#2eaa60 25%,#4ecb7a 50%,#2eaa60 75%,#1a8a4a 100%);background-size:200% 200%;animation:goldShimmer 3s ease infinite}
@keyframes goldShimmer{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.scratch-reveal{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg2)}
.scratch-reveal .sr-pct{font-size:42px;font-weight:800;color:var(--green)}
.scratch-reveal .sr-text{font-size:14px;color:var(--text2)}
.scratch-canvas{position:absolute;top:0;left:0;width:100%;height:100%;cursor:pointer;z-index:5}

/* Confetti */
@keyframes confettiBurst{0%{transform:translateY(0) rotate(0deg) scale(0);opacity:0}10%{opacity:1;transform:translateY(-10vh) rotate(90deg) scale(1.2)}30%{opacity:1}100%{transform:translateY(100vh) rotate(1080deg) scale(0.5);opacity:0}}
.confetti-piece{position:fixed;z-index:300;animation:confettiBurst 2.5s cubic-bezier(0.15,0.8,0.3,1) forwards;pointer-events:none}
.confetti-piece:nth-child(3n){width:10px;height:10px;border-radius:50%}
.confetti-piece:nth-child(3n+1){width:8px;height:14px;border-radius:2px}
.confetti-piece:nth-child(3n+2){width:12px;height:6px;border-radius:1px}

/* Paywall sticky */
.pw-sticky{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;justify-content:space-between}
.pw-timer{color:var(--green);font-weight:700;font-size:14px;font-variant-numeric:tabular-nums}
.pw-sticky-btn{background:var(--green);color:#fff;border:none;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer}

/* Before/After */
.before-after{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:16px 0}
.ba-col{text-align:center}
.ba-photo{width:100%;height:120px;border-radius:12px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:8px}
.ba-label{font-size:12px;font-weight:700;margin-bottom:8px}
.ba-metric{display:flex;align-items:center;gap:6px;margin-bottom:8px;font-size:11px}
.ba-metric span:first-child{width:75px;flex-shrink:0;font-weight:600}
.ba-metric .bar{flex:1;height:8px;background:rgba(0,0,0,0.06);border-radius:4px;overflow:hidden}
.ba-metric .bar-fill{height:100%;border-radius:4px;transition:width 1s ease}
.ba-metric span:last-child{font-weight:700;flex-shrink:0;min-width:45px;text-align:right}

/* Plan cards */
.plan-card{background:var(--bg2);border:2px solid var(--border);border-radius:var(--radius-md);padding:18px 20px;cursor:pointer;transition:all 0.25s;position:relative;margin-bottom:12px;box-shadow:var(--shadow-sm)}
.plan-card.selected{border-color:var(--green);background:rgba(46,170,96,0.04)}
.plan-card.popular{border-color:var(--green)}
.plan-popular-badge{position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;font-size:10px;font-weight:700;padding:3px 12px;border-radius:10px;white-space:nowrap}
.plan-row{display:flex;align-items:center;justify-content:space-between}
.plan-name{font-size:14px;font-weight:700}
.plan-price{text-align:right}
.plan-price .original{font-size:12px;color:var(--text3);text-decoration:line-through}
.plan-price .current{font-size:18px;font-weight:800;color:var(--text)}
.plan-price .per-day{font-size:11px;color:var(--text2)}
.plan-radio{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-right:12px}
.plan-card.selected .plan-radio{border-color:var(--green);background:var(--green)}
.plan-card.selected .plan-radio::after{content:'';width:8px;height:8px;border-radius:50%;background:#fff}

/* Promo badge */
.promo-badge{background:var(--green-light);border:1px solid rgba(46,170,96,0.15);border-radius:12px;padding:12px 16px;text-align:center;margin-bottom:16px}
.promo-badge .pb-text{font-size:12px;color:var(--green);font-weight:600}
.promo-badge .pb-code{font-size:14px;font-weight:800;color:var(--text);margin-top:4px}

/* Goals list */
.goal-list{display:flex;flex-direction:column;gap:10px}
.goal-item{display:flex;align-items:flex-start;gap:10px;font-size:13px;line-height:1.5}
.goal-item .gi-check{color:var(--green);font-size:16px;flex-shrink:0;margin-top:1px}

/* Future pacing grid */
.fp-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:12px}
.fp-col h4{font-size:13px;font-weight:700;margin-bottom:10px;text-align:center}
.fp-item{font-size:12px;line-height:1.5;color:var(--text2);padding:6px 0;border-bottom:1px solid rgba(0,0,0,0.04)}
.fp-item .fp-x{color:var(--red);margin-right:6px}
.fp-item .fp-ok{color:var(--green);margin-right:6px}

/* FAQ */
.faq-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-md);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow-sm)}
.faq-q{padding:14px 18px;cursor:pointer;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:space-between}
.faq-q .faq-arrow{transition:transform 0.3s;font-size:16px;color:var(--text3)}
.faq-item.open .faq-arrow{transform:rotate(180deg)}
.faq-a{max-height:0;overflow:hidden;transition:max-height 0.3s ease,padding 0.3s ease;padding:0 18px}
.faq-item.open .faq-a{max-height:300px;padding:0 18px 14px}
.faq-a p{font-size:13px;color:var(--text2);line-height:1.6}

/* Checkout */

// ============================================================================
// Strategy: variable-reward feedback loop (Duolingo / Noom). Randomized toast
// messages after each answer, confetti burst at milestone questions, and
// progress bar pulse animation to signal momentum.

  {t:'Nice.', e:'✓'},

  {t:'That tracks.', e:'✓'},

};

  }catch(e){}

function burstConfetti(){
  try{

// ============================================================================

// ============================================================================
// Strategy: localStorage buffer flushes on:
//   - every 5 answers (throttled)
//   - unload / pagehide (sendBeacon)
//   - status transitions (email capture, paywall view, purchase)
// Anonymous until email, then email_hash links sessions.
const TRACK_URL='https://cxtoofvckqllsasriczb.supabase.co/functions/v1/quiz-track';
const BUFFER_KEY='_oneraTrackBuf';
// Load buffer from localStorage (survives refresh)
function _trkLoadBuf(){try{return JSON.parse(localStorage.getItem(BUFFER_KEY)||'[]');}catch(e){return [];}}
function _trkSaveBuf(b){try{localStorage.setItem(BUFFER_KEY,JSON.stringify(b));}catch(e){}}
function _trkClearBuf(){try{localStorage.removeItem(BUFFER_KEY);}catch(e){}}

// Capture UTM + referrer once
let _trkMeta=null;
function _trkGetMeta(){
  if(_trkMeta) return _trkMeta;
  const p=new URLSearchParams(location.search);
  const utm={};['utm_source','utm_medium','utm_campaign','utm_content','utm_term'].forEach(k=>{const v=p.get(k);if(v)utm[k]=v;});
  _trkMeta={
    cpp_variant:S.cppId||null,
    fallback_headline:(!S.cppId&&window._FALLBACK)?window._FALLBACK.id:null,
    utm:Object.keys(utm).length?utm:null,
    fbp:S.fbp||null, fbc:S.fbc||null,
    locale:navigator.language||null,
    user_agent:navigator.userAgent||null,
    referrer:document.referrer||null,
  };
  return _trkMeta;
}
// _trkTimes map: question_key → timestamp (ms) when shown
window._trkTimes=window._trkTimes||{};
function trackQuestionShown(qKey){window._trkTimes[qKey]=Date.now();}
// Buffer an answer + flush if threshold reached
function trackAnswer(qKey, qIdx, qType, value, label){
  try{
    const t0=window._trkTimes[qKey]; const tmsp=t0?(Date.now()-t0):null;
    const buf=_trkLoadBuf();
    // De-dupe: replace existing entry for same key
    const idx=buf.findIndex(a=>a.question_key===qKey);
    const entry={question_key:qKey, question_index:qIdx, question_type:qType,
      answer_value:(value==null?null:String(value)),
      answer_label:(label==null?null:String(label)),
      time_on_question_ms:tmsp};
    if(idx>=0)buf[idx]=entry; else buf.push(entry);
    _trkSaveBuf(buf);
    // Flush every 5 answers
    if(buf.length>=5) trackFlush(false);
  }catch(e){}
}
// Flush buffer — sendBeacon if unloading, else fetch keepalive
function trackFlush(isUnload, extraStatus){
  try{
    const buf=_trkLoadBuf();
    const meta=_trkGetMeta();
    // Inject latest email/name/severity if available
    if(S.email) meta.email=S.email;
    if(S.name) meta.first_name=S.name;
    const payload={
      session_id: window._SESS_ID,
      session_meta: meta,
      answers: buf,
      status: extraStatus||{},
    };
    const blob=JSON.stringify(payload);
    if(isUnload && navigator.sendBeacon){
      navigator.sendBeacon(TRACK_URL, new Blob([blob],{type:'application/json'}));
    } else {
      fetch(TRACK_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:blob,keepalive:true}).catch(()=>{});
    }
    if(buf.length>0) _trkClearBuf();
  }catch(e){}
}

// Capture Meta cookies _fbp and _fbc at landing (for CAPI dedup)
(function(){

  if(ck._fbc)S.fbc=ck._fbc;
  // Fallback: if _fbc missing but fbclid in URL, build it
  const fbclid=new URLSearchParams(location.search).get('fbclid');
  if(!S.fbc&&fbclid)S.fbc='fb.1.'+Date.now()+'.'+fbclid;

// Opaque code → CPP mapping (used in ads URLs — never expose cpp=F-1 style in public)
const CODE_TO_CPP={vyn:'F-1',kra:'F-2',luz:'F-3a',syr:'F-3b',nox:'F-4',aev:'F-5',rho:'M-1',tav:'M-2',zel:'M-3',pyr:'M-4',eos:'M-5',orm:'M-6'};
(function(){
  const p=new URLSearchParams(location.search);
  const code=p.get('c');
  const rawCpp=p.get('cpp');
  S.cppId=(code&&CODE_TO_CPP[code])||rawCpp||null;
  // Clean URL: if ?cpp= was used, strip it (keep only ?c=)
  if(rawCpp&&!code){
    const newUrl=location.pathname+(location.hash||'');
    try{history.replaceState(null,'',newUrl);}catch(e){}
  }
})();
let QUIZ_QUESTIONS = getQuestions();

function save(){try{S._ts=Date.now();sessionStorage.setItem('onera_v3',JSON.stringify(S))}catch(e){}}
function restore(){try{const d=JSON.parse(sessionStorage.getItem('onera_v3'));if(d&&Date.now()-(d._ts||0)<1800000){Object.assign(S,d);return true}}catch(e){}return false}

const Q_START=3;
// TOTAL_Q is dynamic — depends on the active CCP's quiz length (varies 25-39).
// Recomputed each time QUIZ_QUESTIONS is reassigned (pickGender, restore).
let TOTAL_Q = QUIZ_QUESTIONS.filter(q=>!q.skipCount).length;
function recomputeTotalQ(){TOTAL_Q = QUIZ_QUESTIONS.filter(q=>!q.skipCount).length;}
// Q_END is computed dynamically — QUIZ_QUESTIONS may include interstitials (skipCount:true)
// which do not count towards the visible "N/26" counter but still consume a step.
function getQEnd(){return Q_START+QUIZ_QUESTIONS.length-1;}
// Visible question number = number of non-interstitial entries up to (and including) idx
function getVisibleQNum(idx){
  let n=0;
  for(let i=0;i<=idx&&i<QUIZ_QUESTIONS.length;i++){
    if(!QUIZ_QUESTIONS[i].skipCount)n++;
  }
  return n;
}

      // Interstitial — hold the previous question's number (do not advance counter)
      const prevNum=getVisibleQNum(qIdx-1);
      pf.style.width=(prevNum/TOTAL_Q*100)+'%';
      pc.textContent=prevNum+' / '+TOTAL_Q;

      <div class="freq3-opt" onclick="answerQ(${qIdx},'no')" style="justify-content:flex-start;padding:18px 20px;gap:14px;"><div style="flex-shrink:0;"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="8" fill="#fef2f2"/><path d="M10 10l8 8M18 10l-8 8" stroke="#dc4a4a" stroke-width="2.2" stroke-linecap="round"/></svg></div><div class="f3-label" style="font-size:16px;font-weight:600;">No</div></div>
    </div></div>`;
  }
  else if(q.type==='yesno3'){
    h=`<div class="screen active q-screen"><h2 class="q-title">${q.text}</h2><div class="freq3-opts">
      <div class="freq3-opt" onclick="answerQ(${qIdx},'yes')" style="justify-content:flex-start;padding:18px 20px;gap:14px;"><div style="flex-shrink:0;"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="8" fill="#e8f5e9"/><path d="M8 14.5l4 4 8-9" stroke="#2eaa60" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="f3-label" style="font-size:16px;font-weight:600;">Yes</div></div>
      <div class="freq3-opt" onclick="answerQ(${qIdx},'no')" style="justify-content:flex-start;padding:18px 20px;gap:14px;"><div style="flex-shrink:0;"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="8" fill="#fef2f2"/><path d="M10 10l8 8M18 10l-8 8" stroke="#dc4a4a" stroke-width="2.2" stroke-linecap="round"/></svg></div><div class="f3-label" style="font-size:16px;font-weight:600;">No</div></div>
      <div class="freq3-opt" onclick="answerQ(${qIdx},'unsure')" style="justify-content:flex-start;padding:18px 20px;gap:14px;"><div style="flex-shrink:0;"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="8" fill="#f5f5f5"/><circle cx="14" cy="14" r="7" stroke="#999" stroke-width="1.8" fill="none"/><path d="M12 12.5c0-1 .8-1.5 1.8-1.5 1.2 0 2 .7 2 1.6 0 .8-.5 1.2-1.3 1.5-.5.2-.7.5-.7.9" stroke="#999" stroke-width="1.5" stroke-linecap="round"/><circle cx="14" cy="18" r="0.8" fill="#999"/></svg></div><div class="f3-label" style="font-size:16px;font-weight:600;">Hard to say</div></div>
    </div></div>`;
  }
  else if(q.type==='multi'){
    const sk='m_'+qIdx;if(!S.selectedMulti[sk])S.selectedMulti[sk]=[];const sel=S.selectedMulti[sk];
    // Icon bank — returns ranked candidates per option. Then a de-dupe pass picks unique icons per question.
    // Each option gets a DIFFERENT icon on the same screen (like Liven).
    function rankIcons(txt){
      const t=txt.toLowerCase();
      const c=[];
      // Body/somatic: tension, jaw, muscles, physical release
      if(/jaw|clench|grind|tension|somatic|muscle|shoulder|physical|posture|stiff/.test(t))c.push('mi-body');
      // Heart/emotion: cry, feel, numb, joy, love, hurt
      if(/cry|tears|weep|emotion|feeling|numb|flat|joy|grief|hurt|heart|love myself|ache|hollow/.test(t))c.push('mi-heart');
      // Brain/cognitive: overthink, understand, insight, mind, know, rumination
      if(/overthink|rumina|insight|understand|know|brain|mind|thought|analyze|figure out|mental/.test(t))c.push('mi-brain');
      // Sleep/dream: nightmare, sleep, rest, bedtime, dreams
      if(/sleep|night|dream|nightmare|bedtime|rest|wake|pillow|insomnia/.test(t))c.push('mi-moon');
      // Energy/power: exhaust, drained, execute, drive, momentum, action
      if(/energy|exhaust|drained|power|execute|executing|momentum|drive|spark|fuel|charge|battery|electric/.test(t))c.push('mi-energy');
      // Love/relationship: partner, love, attraction, safe love, intimacy
      if(/partner|relationship|attach|intima|close|bond|love\b|safe with|safety|receive|dating/.test(t))c.push('mi-love');
      // Family/inheritance: mother, father, daughter, son, cycle, pattern, inherit, chain, child
      if(/mother|father|mom|dad|daughter|son|family|parent|cycle|chain|pattern|inherit|generational|child|kids/.test(t))c.push('mi-family');
      // Star/sabotage/anger: destroy, sabotage, impulse, react, anger, react, explosion
      if(/sabotage|destroy|anger|rage|impulse|explod|react|lash|hijack|angry|rage/.test(t))c.push('mi-star');
      // Check/present/home: back, home, present, alive, keep, here, real
      if(/back to|home|present|alive|keep|real|myself|whole|landing|arrived|grounded/.test(t))c.push('mi-check');
      // Speech/voice: speak, voice, tell, story, write, express
      if(/voice|speak|tell|story|writ|express|say|share|word/.test(t))c.push('mi-speech');
      // Calm/peace: calm, peace, serenity, lotus
      if(/calm|peace|serenit|still|quiet|soothe|relax|breathe/.test(t))c.push('mi-calm');
      // Focus/target: focus, target, aim, direction, goal
      if(/focus|target|aim|direction|goal|achieve|accomplish/.test(t))c.push('mi-focus');
      // Fist/strength: willpower, strength, push through, endurance
      if(/willpower|strong|strength|endure|push through|tough|resilien|fight back/.test(t))c.push('mi-fist');
      // Shield/protect: protect, boundary, safe from, defense
      if(/shield|protect|boundary|defend|safe from|guard|wall/.test(t))c.push('mi-shield');
      // Briefcase/work: job, work, career, build, professional, money, performance
      if(/job|work|career|professional|office|build\b|money|income|boss|project/.test(t))c.push('mi-briefcase');
      // Mirror/self-image: appear, mirror, self-esteem, face, look, reflect
      if(/mirror|appearance|self-esteem|face|reflect|image|look older|younger|photo/.test(t))c.push('mi-mirror');
      // Arrows/change/pattern: external, circumstance, change, cycle again, repeat, loop
      if(/external|circumstance|change|repeat|again|loop|shift|break the/.test(t))c.push('mi-arrows');
      // Grid/other/complexity
      if(/other|more|everything|complex|mix/.test(t))c.push('mi-grid');
      // Sleep face — specific tired/exhausted state
      if(/tired|fatigue|worn out|can\'t function|depleted/.test(t))c.push('mi-sleep');
      // Sparkle — goal/transformation/wish
      if(/wish|magic|transform|finally|feel something|alive again|shift|breakthrough/.test(t))c.push('mi-sparkle');
      return c;
    }
    // De-duplication: each option must get a unique icon on this screen
    const iconPool=['mi-body','mi-heart','mi-brain','mi-moon','mi-energy','mi-love','mi-family','mi-star','mi-check','mi-speech','mi-calm','mi-focus','mi-fist','mi-shield','mi-briefcase','mi-mirror','mi-arrows','mi-sleep','mi-sparkle','mi-grid'];
    const used=new Set();
    const opts=q.opts;
    const iconPerOpt=new Array(opts.length);
    // Hash function for stable but varied assignment
    function hashStr(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h+s.charCodeAt(i))|0;}return Math.abs(h);}
    // First pass — assign each option its top-ranked UNUSED icon
    opts.forEach((o,i)=>{
      const ranked=rankIcons(o);
      for(const ic of ranked){ if(!used.has(ic)){ iconPerOpt[i]=ic; used.add(ic); break; } }
    });
    // Second pass — options that didn't match anything or collided get a stable hashed fallback from the pool
    opts.forEach((o,i)=>{
      if(iconPerOpt[i])return;
      const h=hashStr(o+qIdx);
      for(let k=0;k<iconPool.length;k++){
        const cand=iconPool[(h+k)%iconPool.length];
        if(!used.has(cand)){ iconPerOpt[i]=cand; used.add(cand); return; }
      }
      iconPerOpt[i]='mi-sparkle';
    });
    function multiIcon(txt,i){return 'img/'+(iconPerOpt[i]||'mi-sparkle')+'.png';}
    h=`<div class="screen active q-screen"><h2 class="q-title">${q.text}</h2><p class="q-sub">${q.sub||''}</p><div class="options" id="multiOpts">
      ${q.opts.map((o,i)=>`<div class="option-card multi-opt ${sel.includes(i)?'selected':''}" onclick="toggleMulti(${qIdx},${i})" data-idx="${i}">
        <div style="width:44px;height:44px;flex-shrink:0;display:flex;align-items:center;justify-content:center;"><img src="${multiIcon(o,i)}" style="width:100%;height:100%;object-fit:contain;" alt=""></div>
        <div class="opt-label" style="flex:1;">${o}</div>
        <div class="checkbox"><svg viewBox="0 0 16 16" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" style="width:12px;height:12px;"><path d="M3 8l3.5 3.5L13 5"/></svg></div>
      </div>`).join('')}
    </div><button class="btn-continue" id="multiBtn" onclick="submitMulti(${qIdx})" ${sel.length===0?'disabled':''}>Continue</button></div>`;
  }
  app.innerHTML=h;
}

// Interstitial advance — stores a lightweight answer (optional) + fires custom pixel
function advanceInterstitial(qIdx){
  fbq('trackCustom','QuizInterstitial',{idx:qIdx,sub:(QUIZ_QUESTIONS[qIdx]||{}).subtype||''});
  go();
}
// Consistency lock: stores choice in S.answers for analytics without affecting Q numbering
function lockChoice(qIdx,choice){
  S.answers['lock_'+qIdx]=choice;
  fbq('trackCustom','QuizConsistencyLock',{choice:choice});
  // Visual feedback on the tapped option
  if(event&&event.currentTarget){event.currentTarget.classList.add('just-selected');}
  setTimeout(()=>advanceInterstitial(qIdx),350);
}

function toggleMulti(qIdx,optIdx){
  const sk='m_'+qIdx;if(!S.selectedMulti[sk])S.selectedMulti[sk]=[];
  const sel=S.selectedMulti[sk];const idx=sel.indexOf(optIdx);
  if(idx>-1)sel.splice(idx,1);else sel.push(optIdx);
  document.querySelectorAll('.multi-opt').forEach(c=>{c.classList.toggle('selected',sel.includes(parseInt(c.dataset.idx)));});
  const btn=document.getElementById('multiBtn');if(btn)btn.disabled=sel.length===0;

// Compute "Pattern Intensity" score — PHQ-9-inspired weighted aggregation
// Returns {score:68-94, zone, label, gaugePct} — bounded to avoid 100% (suspicious) or <50% (demotivating)
function computeSeverityScore(){
  const Q=QUIZ_QUESTIONS; let sum=0, weight=0;
  for(let i=0;i<Q.length;i++){
    const q=Q[i], key='q'+getVisibleQNum(i), ans=S.answers[key];
    if(ans==null) continue;
    // Likert 1-5 → 0-100, high weight (deepest confessions)
    if(q.type==='likert5'){const v=((Number(ans)-1)/4)*100; sum+=v*2; weight+=2;}
    // Freq3 with pain scale (0=Often/worst, 2=Rarely/best) → invert to severity, medium weight
    else if(q.type==='freq3' && !q.customOpts){const v=(1-Number(ans)/2)*100; if(!isNaN(v)){sum+=v*1.5; weight+=1.5;}}
    // Yesno → full severity or 0, medium weight
    else if(q.type==='yesno2' || q.type==='yesno3'){const v=(ans==='yes')?100:0; sum+=v*1; weight+=1;}
    // Multi-select → % of categories flagged, low weight
    else if(q.type==='multi' && Array.isArray(ans)){const v=(ans.length/(q.opts.length||6))*100; sum+=v*0.5; weight+=0.5;}
  }
  const raw=weight>0?sum/weight:75;
  // Bound 68-94% — never 100 (suspicious), never <50 (demotivating for paywall)
  const score=Math.max(68,Math.min(94,Math.round(raw)));
  // 3 zones aligned with floor range — all users land in Elevated/High/Critical (validates pain)
  let zone='elevated', label='Elevated';
  if(score>=88){zone='critical'; label='Critical';}
  else if(score>=78){zone='high'; label='High';}
  else {zone='elevated'; label='Elevated';}
  return {score, zone, label, gaugePct:score};
}

function initScratch(){
  const c=document.getElementById('scratchCanvas');if(!c)return;
  const w=document.getElementById('scratchWrap');const r=w.getBoundingClientRect();
  c.width=r.width*2;c.height=r.height*2;c.style.width=r.width+'px';c.style.height=r.height+'px';
  const ctx=c.getContext('2d');ctx.scale(2,2);
  // Orange gradient scratch layer (Liven-style)
  const grd=ctx.createLinearGradient(0,0,r.width,r.height);
  grd.addColorStop(0,'#f4a574');grd.addColorStop(0.5,'#eb7a4a');grd.addColorStop(1,'#d85a2a');
  ctx.fillStyle=grd;ctx.fillRect(0,0,r.width,r.height);
  // Subtle warm sparkle pattern
  for(let i=0;i<30;i++){ctx.fillStyle=`rgba(255,255,255,${0.06+Math.random()*0.08})`;ctx.beginPath();ctx.arc(Math.random()*r.width,Math.random()*r.height,1.5+Math.random()*3,0,Math.PI*2);ctx.fill();}
  // Big "?" centered (Liven-exact)
  ctx.font='900 120px "Plus Jakarta Sans",sans-serif';ctx.fillStyle='rgba(255,255,255,0.85)';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('?',r.width/2,r.height/2);
  // Canvas is painted → safe to reveal the hidden content underneath
  const rev=document.getElementById('scratchReveal');if(rev)rev.style.visibility='visible';
  let down=false,sc=0;const tot=r.width*r.height;ctx.globalCompositeOperation='destination-out';
  // Smaller brush (15px) + need 60% scratched
  function s(x,y){ctx.beginPath();ctx.arc(x,y,15,0,Math.PI*2);ctx.fill();sc+=Math.PI*225;if(sc/tot>0.60&&!S.scratchDone){S.scratchDone=true;revealScratch();}}
  c.onmousedown=e=>{down=true;const b=c.getBoundingClientRect();s(e.clientX-b.left,e.clientY-b.top);};
  c.onmousemove=e=>{if(!down)return;const b=c.getBoundingClientRect();s(e.clientX-b.left,e.clientY-b.top);};
  c.onmouseup=c.onmouseleave=()=>down=false;
  c.ontouchstart=e=>{e.preventDefault();const t=e.touches[0];const b=c.getBoundingClientRect();s(t.clientX-b.left,t.clientY-b.top);};
  c.ontouchmove=e=>{e.preventDefault();const t=e.touches[0];const b=c.getBoundingClientRect();s(t.clientX-b.left,t.clientY-b.top);};
}

function revealScratch(){
  const c=document.getElementById('scratchCanvas');if(c)c.style.display='none';
  document.getElementById('scratchResult').style.display='block';
  confetti();
  // Show woohoo popup after confetti
  setTimeout(()=>{const p=document.getElementById('woohooPopup');if(p)p.style.display='flex';},800);
}

function confetti(){
  const cols=['#2eaa60','#f1c40f','#e74c3c','#5b6abf','#ff6b6b','#e67e22','#45d97a','#ff9ff3','#54a0ff','#feca57'];
  // Wave 1: burst from top across full width
  for(let i=0;i<120;i++){
    const e=document.createElement('div');e.className='confetti-piece';
    e.style.left=Math.random()*100+'%';
    e.style.top=(-10-Math.random()*20)+'%';
    e.style.background=cols[Math.floor(Math.random()*cols.length)];
    e.style.animationDuration=(2+Math.random()*3)+'s';
    e.style.animationDelay=(Math.random()*0.8)+'s';
    e.style.setProperty('--spread',(Math.random()-0.5)*30+'vw');
    document.body.appendChild(e);
    setTimeout(()=>e.remove(),5000);
  }
  // Wave 2: delayed side bursts
  setTimeout(()=>{
    for(let i=0;i<40;i++){
      const e=document.createElement('div');e.className='confetti-piece';
      e.style.left=(Math.random()>0.5?-5:105)+'%';
      e.style.top=(20+Math.random()*40)+'%';
      e.style.background=cols[Math.floor(Math.random()*cols.length)];
      e.style.animationDuration=(2+Math.random()*2)+'s';
      e.style.setProperty('--spread',(Math.random()-0.5)*50+'vw');
      document.body.appendChild(e);
      setTimeout(()=>e.remove(),4000);
    }
  },400);
}

// Derive dynamic insights from quiz answers for paywall personalization
function getAnswerInsights(){
  const a=S.answers;
  // Q1=drained, Q2=sleep, Q3=dreams, Q4=overwhelmed, Q5=thoughts, Q6=peace
  // Q7-Q10=likert (0-4 scale), Q11-Q15=deep CPP-specific
  const drained=a.q1===0; // "Often"
  const sleepBad=a.q2===0;
  const dreamRecall=a.q3===0; // "Often"
  const overwhelmed=a.q4===0;
  const ruminate=a.q5===0;
  const noPeace=a.q6===2; // "No"

  // Find strongest likert pain (Q7-Q10, value 4-5 = strongly agree)
  const likerts=[a.q7||0,a.q8||0,a.q9||0,a.q10||0];
  const maxLikert=Math.max(...likerts);

  // Severity score (0-10)
  let severity=0;
  if(drained)severity+=1.5;
  if(sleepBad)severity+=1.5;
  if(overwhelmed)severity+=1;
  if(ruminate)severity+=1;
  if(noPeace)severity+=2;
  if(maxLikert>=4)severity+=3;
  severity=Math.min(10,severity);

  // Dynamic energy/wellbeing levels based on answers
  const energyPct=drained?15:sleepBad?25:40;
  const wellbeingPct=noPeace?10:overwhelmed?20:35;
  const esteemPct=maxLikert>=4?15:maxLikert>=3?25:40;

  // Dynamic "without" items based on what they answered
  const withoutItems=[];
  if(drained)withoutItems.push('Waking up exhausted every day');
  if(sleepBad)withoutItems.push('Restless nights on repeat');
  if(dreamRecall)withoutItems.push('Dreams you can\'t decode');
  if(overwhelmed)withoutItems.push('Overwhelm with no relief');
  if(ruminate)withoutItems.push('Same thoughts on loop');
  if(noPeace)withoutItems.push('No peace inside');
  // Fill to 7 from CPP defaults
  const PW=CPP_PAYWALL[S.cppId]||CPP_PAYWALL['F-2'];
  while(withoutItems.length<7)withoutItems.push(PW.without[withoutItems.length]||'Patterns repeating');

  return{severity,energyPct,wellbeingPct,esteemPct,withoutItems:withoutItems.slice(0,7),maxLikert};
}

function answerQ(qi,v){
  // Use VISIBLE question number (skips interstitials) so downstream logic
  // (renderProfile, getAnswerInsights) can still reference q1..q26 stably.
  const qKey='q'+getVisibleQNum(qi);
  S.answers[qKey]=v;
  fbq('trackCustom','QuizAnswer',{question:qKey,answer:v});
  // Track granular answer — derive label from the question options
  let qObj=QUIZ_QUESTIONS[qi]; let label=String(v);
  try{
    if(qObj){
      if(qObj.type==='likert5') label=['','Strongly disagree','Disagree','Neutral','Agree','Strongly agree'][v]||String(v);
      else if(qObj.type==='freq3'){const opts=qObj.customOpts||['Often','Sometimes','Rarely'];label=opts[v]||String(v);}
      else if(qObj.type==='yesno2'||qObj.type==='yesno3') label=String(v);
    }
    trackAnswer(qKey, getVisibleQNum(qi), qObj?.type||'unknown', v, label);
  }catch(e){}
  // Email opt-in gate — queue 20-email abandon sequence ONLY if user picks "Sure, I'm in!" (v===0)
  if(qObj&&qObj.isOptIn){
    S.optIn = (v===0);
    if(S.optIn && S.email){
      try{fetch(SUPABASE_URL+'/capture-email',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:S.email,cpp:S.cppId||'F-2',gender:S.gender||'F',source:'quiz_opt_in'})}).catch(()=>{});}catch(e){}
    }
  }
  // Dopamine micro-reward (animations post-answer)
  try{triggerDopamineReward(qi);}catch(e){}
  // Visual selection feedback before advancing
  if(event&&event.currentTarget){const el=event.currentTarget;el.classList.add('just-selected');}
  setTimeout(go,350);
}

    const v=parseInt(sel.getAttribute('data-sel'));
    if(!isNaN(v))S.selectedPlan=v;
  }
  // DOWNSELL POPUP: if user picks 7-day trial ($6.93) → offer 12-week (best value) at promo-capped -71%
  // Skip if already shown once OR plan is already 12-week OR discount has expired
  if(S.selectedPlan===0 && !S.downsellShown && !S.discountExpired){
    S.downsellShown=true;
    showDownsellPopup();
    return;
  }
  console.log('[goCheckout] S.selectedPlan =',S.selectedPlan,'planKey will be:',S.discountExpired?['trial_full','4week_full','12week_full'][S.selectedPlan]:['trial','4week','12week'][S.selectedPlan]);
  S.step=getQEnd()+12; // Checkout step
  render();
}

          <div style="display:flex;flex-direction:column;align-items:flex-start;line-height:1.1;margin-left:2px;"><span style="font-size:22px;font-weight:800;color:var(--green);">%</span><span style="font-size:18px;font-weight:700;color:var(--green);">off</span></div>

        <div style="position:absolute;top:50%;left:10px;right:10px;border-top:1.5px dashed rgba(104,196,126,0.5);pointer-events:none;"></div>

function claimDownsell(){
  S.selectedPlan=2; // 12-week plan
  // Update DOM plan selection
  document.querySelectorAll('.plan-card').forEach(el=>{
    const s=parseInt(el.getAttribute('data-sel'));
    el.classList.toggle('selected',s===2);
  });
  const p=document.getElementById('downsellPopup'); if(p) p.remove();
  try{fbq('trackCustom','Downsell_Claimed',{to_plan:'12week'});}catch(e){}
  S.step=getQEnd()+12;
  render();
}

function dismissDownsell(){
  const p=document.getElementById('downsellPopup'); if(p) p.remove();
  try{fbq('trackCustom','Downsell_Dismissed',{kept_plan:'7day'});}catch(e){}
  // Proceed with original 7-day trial
  S.step=getQEnd()+12;
  render();
}
function fmt(s){const m=Math.floor(s/60);const sc=s%60;return m+':'+(sc<10?'0':'')+sc;}

async function doStripePay(){
  const b=document.getElementById('payBtn');
  if(b){b.disabled=true;b.innerHTML='Processing...';}
  const errEl=document.getElementById('payError');

  try{
    // Event ID for Meta CAPI deduplication (client pixel + server CAPI share same ID)
    const ic_eid='ic_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);
    window._lastInitiateCheckoutId=ic_eid;
    const _icAmount=S.discountExpired?[17.77,38.95,66.65][S.selectedPlan]:[6.93,15.19,25.99][S.selectedPlan];
    fbq('track','InitiateCheckout',{value:_icAmount,currency:'USD',content_name:S.cppId,eventID:ic_eid});

    // Confirm payment with the already-mounted Stripe Elements
    if(!window._stripe||!window._stripeElements){throw new Error('Payment not loaded. Please refresh.');}

    const {error}=await window._stripe.confirmPayment({
      elements:window._stripeElements,
      confirmParams:{
        return_url:window.location.origin+window.location.pathname+'?success=1&cpp='+(S.cppId||'F-1'),
        receipt_email:S.email||undefined,
      },
      redirect:'if_required',
    });

    if(error){
      if(errEl){errEl.style.display='block';errEl.textContent=error.message;}
      if(b){b.disabled=false;b.innerHTML='&#128274; PAY $'+(S.discountExpired?[17.77,38.95,66.65][S.selectedPlan]:[6.93,15.19,25.99][S.selectedPlan]).toFixed(2);}
    }else{
      // Payment succeeded — call quiz-success to create account + get deeplink
      if(b)b.innerHTML='Setting up your account...';
      try{
        const planKey=S.discountExpired?['trial_full','4week_full','12week_full'][S.selectedPlan]:['trial','4week','12week'][S.selectedPlan];
        const sr=await fetch(SUPABASE_URL+'/quiz-success',{
          method:'POST',
          headers:{'Content-Type':'application/json','Accept':'application/json'},
          body:JSON.stringify({payment_intent_id:window._lastPiId||'',email:S.email,name:S.name,cpp:S.cppId||'F-1',gender:S.gender||'F',plan:planKey})
        });
        const sd=await sr.json();
        if(sd.deeplink)S.deeplink=sd.deeplink;
        console.log('quiz-success response:',sd);
      }catch(e){console.error('quiz-success call failed:',e);}
      const paidAmount=S.discountExpired?[17.77,38.95,66.65][S.selectedPlan]:[6.93,15.19,25.99][S.selectedPlan];
      // Event ID = Stripe PI id (same ID will be sent server-side via CAPI for dedup)
      const p_eid=(window._lastPiId||('pur_'+Date.now()+'_'+Math.random().toString(36).slice(2,8)));
      fbq('track','Purchase',{value:paidAmount,currency:'USD',content_name:S.cppId,eventID:p_eid});
      logMABEvent('purchase',{amount:paidAmount,plan:S.selectedPlan});
      try{trackFlush(false,{purchased:true,purchase_amount:paidAmount});}catch(e){}
      S.step=getQEnd()+13;render();
    }
  }catch(e){
    console.error(e);
    if(errEl){errEl.style.display='block';errEl.textContent=e.message||'Something went wrong. Please try again.';}
    if(b){b.disabled=false;b.innerHTML='&#128274; PAY';}
  }
}

// ==================== BOOT ====================
// Handle ?manage=1&email=... — redirect straight to Stripe portal
const _bootParams=new URLSearchParams(location.search);
if(_bootParams.get('manage')==='1'){
  const mEmail=_bootParams.get('email')||'';
  if(mEmail){
    document.getElementById('app').innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100dvh;text-align:center;padding:20px;"><p style="color:var(--text2);">Redirecting to subscription manager...</p></div>';
    fetch(SUPABASE_URL+'/create-portal-session',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:mEmail})})
      .then(r=>r.json()).then(d=>{if(d.url)window.location.href=d.url;else{document.getElementById('app').innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100dvh;text-align:center;padding:20px;"><p>Could not load subscription manager.<br>Contact <a href="mailto:support@onera.app">support@onera.app</a></p></div>';}})
      .catch(()=>{document.getElementById('app').innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100dvh;text-align:center;padding:20px;"><p>Connection error.<br>Contact <a href="mailto:support@onera.app">support@onera.app</a></p></div>';});
  }
}else{
// URL param ALWAYS overrides session storage for cppId (supports both opaque ?c= and raw ?cpp=)
const _urlCpp=_bootParams.get('cpp');
const _urlCode=_bootParams.get('c');
const _resolvedCpp=(_urlCode&&CODE_TO_CPP[_urlCode])||_urlCpp||null;
if(restore()){if(_resolvedCpp){S.cppId=_resolvedCpp;S.step=0;QUIZ_QUESTIONS=getQuestions();recomputeTotalQ();}render();}else{render();}
}

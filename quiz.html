<style>
  /* Fonts loaded via <link> in <head> for faster rendering */
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #100e14; --bg-card: #16131e; --bg-card-hover: #1e1a28;
    --text: #ede8e0; --text-muted: #b5a99a; --text-dim: #8a7d6f;
    --accent: #c4956a; --accent-glow: rgba(196,149,106,0.12); --accent-bright: #d4a87a;
    --purple: #8b7ec8; --purple-glow: rgba(139,126,200,0.10);
    --red: #e85d5d; --green: #6ecf8e;
    --border: #1f1b28; --border-active: rgba(196,149,106,0.3);
  }
  body { font-family: 'Plus Jakarta Sans', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; overflow-x: hidden; line-height: 1.7; }
  .serif { font-family: 'Instrument Serif', Georgia, serif; }

  /* Ambient */
  .ambient { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
  .ambient::before { content: ''; position: absolute; top: 20%; left: 50%; transform: translate(-50%,-50%); width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, var(--purple-glow) 0%, var(--accent-glow) 40%, transparent 70%); animation: pulse 8s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 0.5; transform: translate(-50%,-50%) scale(1); } 50% { opacity: 0.8; transform: translate(-50%,-50%) scale(1.1); } }

  /* Container */
  .quiz-container { position: relative; z-index: 1; max-width: 440px; margin: 0 auto; min-height: 100dvh; padding: 20px 20px 40px; display: flex; flex-direction: column; }

  /* Progress */
  .progress-bar { position: fixed; top: 0; left: 0; width: 100%; height: 3px; background: rgba(255,255,255,0.05); z-index: 100; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--purple), var(--accent)); border-radius: 0 2px 2px 0; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
  .progress-text { position: fixed; top: 8px; right: 16px; font-size: 11px; color: var(--text-muted); z-index: 100; letter-spacing: 0.5px; }

  /* Back */
  .back-btn { position: fixed; top: 10px; left: 16px; z-index: 100; background: none; border: none; color: var(--text-muted); font-size: 18px; cursor: pointer; padding: 12px; min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center; opacity: 0.6; transition: opacity 0.2s; }
  .back-btn:hover { opacity: 1; }

  /* Screens */
  .screen { display: none; flex-direction: column; flex: 1; animation: fadeIn 0.4s ease; }
  .screen.active { display: flex; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  /* Landing */
  .landing { justify-content: center; align-items: center; text-align: center; gap: 32px; padding-top: 60px; }
  .landing-icon { font-size: 48px; margin-bottom: -8px; }
  .landing h1 { font-family: 'Instrument Serif', Georgia, serif; font-size: 28px; font-weight: 400; line-height: 1.35; letter-spacing: -0.3px; max-width: 340px; }
  .landing h1 em { font-style: italic; color: var(--accent); }
  .landing .sub { font-size: 14px; color: var(--text-muted); line-height: 1.6; max-width: 300px; }
  .landing .cta-main { background: var(--accent); color: #0a0a14; border: none; padding: 16px 40px; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.3s; letter-spacing: 0.3px; }
  .landing .cta-main:hover { background: var(--accent-bright); transform: translateY(-1px); box-shadow: 0 8px 30px var(--accent-glow); }
  .landing .trust { display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .landing .trust span { font-size: 11px; color: var(--text-dim); letter-spacing: 0.5px; }
  .landing .trust-badges { display: flex; gap: 16px; font-size: 11px; color: var(--text-muted); }

  /* Questions */
  .question-screen { padding-top: 50px; gap: 20px; }
  .question-label { font-size: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: 2.5px; font-weight: 600; opacity: 0.85; margin-bottom: -4px; }
  .question-text { font-family: 'Plus Jakarta Sans', -apple-system, sans-serif; font-size: 21px; font-weight: 600; line-height: 1.45; letter-spacing: -0.3px; color: #f5f1ec; }
  .question-sub { font-size: 13px; color: var(--text-muted); line-height: 1.5; margin-top: -12px; }
  .options { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
  .option { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; cursor: pointer; transition: all 0.25s; display: flex; align-items: center; gap: 14px; min-height: 56px; }
  .option:hover { background: var(--bg-card-hover); border-color: var(--border-active); }
  .option:active { transform: scale(0.98); }
  .option .icon { flex-shrink: 0; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 8px; background: rgba(196,149,106,0.08); color: var(--accent); }
  .option .icon i[data-lucide] { width: 18px; height: 18px; }
  .option .label { font-size: 14.5px; line-height: 1.5; color: var(--text); font-weight: 400; }
  .option .label small { display: block; font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .option.selected { border-color: var(--accent); background: rgba(196,149,106,0.06); }
  .yesno-option:active { transform: scale(0.98); }
  .gender-card:active { transform: scale(0.98); }

  /* Gender */
  .gender-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .gender-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 36px 20px; text-align: center; cursor: pointer; transition: all 0.3s; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .yesno-options { display: flex; flex-direction: column; gap: 10px; }
  .yesno-option { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; cursor: pointer; text-align: left; transition: all 0.2s; font-size: 14px; color: var(--text); line-height: 1.45; }
  .yesno-option:hover { border-color: var(--accent); background: var(--accent-glow); }
  .gender-card:hover { border-color: var(--border-active); background: var(--bg-card-hover); }
  .gender-card.female:hover { border-color: rgba(212,165,116,0.4); background: rgba(212,165,116,0.06); }
  .gender-card.male:hover { border-color: rgba(139,126,200,0.4); background: rgba(139,126,200,0.06); }
  .gender-card .g-icon { font-size: 36px; }
  .gender-card .g-label { font-size: 15px; font-weight: 500; }

  /* Interstitial */
  .interstitial { justify-content: center; align-items: center; text-align: center; gap: 24px; padding: 40px 10px; }
  .interstitial .big-text { font-family: 'Instrument Serif', Georgia, serif; font-size: 24px; line-height: 1.45; max-width: 320px; }
  .interstitial .big-text em { font-style: italic; color: var(--accent); }
  .interstitial .detail { font-size: 13px; color: var(--text-muted); line-height: 1.6; max-width: 300px; }
  .interstitial .continue-btn { background: transparent; border: 1px solid var(--border-active); color: var(--accent); padding: 14px 36px; border-radius: 12px; font-size: 14px; cursor: pointer; transition: all 0.3s; }
  .interstitial .continue-btn:hover { background: var(--accent-glow); }

  /* Social proof */
  .social-proof-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; text-align: left; }
  .social-proof-card .quote { font-size: 13px; line-height: 1.6; color: var(--text); font-style: italic; opacity: 0.85; }
  .social-proof-card .author { font-size: 12px; color: var(--text-muted); margin-top: 10px; }

  /* Quiz images */
  .quiz-hero-img { width: 100%; max-height: 180px; object-fit: cover; border-radius: 14px; opacity: 0.7; margin-bottom: 8px; }
  .quiz-mood-img { width: 100%; max-height: 140px; object-fit: cover; border-radius: 12px; opacity: 0.55; margin-bottom: 16px; mask-image: linear-gradient(to bottom, black 60%, transparent); -webkit-mask-image: linear-gradient(to bottom, black 60%, transparent); }

  /* Loading / Analysis */
  .analysis-screen { justify-content: center; align-items: center; text-align: center; gap: 24px; }
  .analysis-steps { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 300px; }
  .analysis-step { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text-muted); transition: all 0.5s; }
  .analysis-step.done { color: var(--text); }
  .analysis-step .check { width: 18px; height: 18px; border-radius: 50%; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 10px; transition: all 0.4s; flex-shrink: 0; }
  .analysis-step.done .check { background: var(--accent); border-color: var(--accent); color: #0a0a14; }
  .loader-bar { width: 200px; height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
  .loader-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--purple), var(--accent)); transition: width 0.3s; }

  /* Result */
  .result-screen { padding-top: 40px; gap: 24px; }
  .result-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--accent-glow); border: 1px solid var(--border-active); padding: 6px 14px; border-radius: 20px; font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; align-self: flex-start; }
  .result-title { font-family: 'Instrument Serif', Georgia, serif; font-size: 26px; line-height: 1.35; }
  .result-desc { font-size: 14px; line-height: 1.7; color: var(--text-muted); }
  .result-mechanism { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; }
  .result-mechanism .mech-label { font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .result-mechanism .mech-text { font-size: 13px; line-height: 1.65; color: var(--text); opacity: 0.85; }
  .result-body { display: flex; align-items: center; gap: 12px; padding: 14px 18px; background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); }
  .result-body .body-icon { font-size: 24px; }
  .result-body .body-text { font-size: 13px; color: var(--text-muted); }
  .result-body .body-text strong { color: var(--text); }
  .result-cta { background: var(--accent); color: #0a0a14; border: none; padding: 16px; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.3s; text-align: center; margin-top: 8px; }
  .result-cta:hover { background: var(--accent-bright); }

  /* Paywall */
  .paywall-screen { padding-top: 30px; gap: 20px; }
  .paywall-header { text-align: center; }
  .paywall-header h2 { font-family: 'Instrument Serif', Georgia, serif; font-size: 26px; margin-bottom: 6px; }
  .paywall-header .pw-sub { font-size: 14px; color: var(--text-muted); line-height: 1.5; }

  /* Timer */
  .timer-bar { background: rgba(232,93,93,0.1); border: 1px solid rgba(232,93,93,0.2); border-radius: 10px; padding: 12px 16px; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .timer-bar .timer-icon { font-size: 16px; }
  .timer-bar .timer-text { font-size: 13px; color: var(--red); font-weight: 500; }
  .timer-bar .timer-countdown { font-size: 15px; font-weight: 700; color: var(--red); font-variant-numeric: tabular-nums; }

  /* Pricing */
  .pricing-card { background: var(--bg-card); border: 2px solid var(--accent); border-radius: 16px; padding: 24px; text-align: center; position: relative; overflow: hidden; }
  .pricing-badge { position: absolute; top: 0; right: 0; background: var(--accent); color: #0a0a14; font-size: 11px; font-weight: 700; padding: 4px 14px 4px 18px; border-radius: 0 0 0 12px; letter-spacing: 0.5px; }
  .pricing-original { font-size: 14px; color: var(--text-muted); text-decoration: line-through; }
  .pricing-current { font-size: 42px; font-weight: 700; color: var(--text); margin: 4px 0; }
  .pricing-current span { font-size: 16px; font-weight: 400; color: var(--text-muted); }
  .pricing-per { font-size: 13px; color: var(--text-muted); }
  .pricing-savings { display: inline-block; background: rgba(110,207,142,0.1); color: var(--green); font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 20px; margin-top: 10px; }

  /* Features */
  .features { display: flex; flex-direction: column; gap: 10px; }
  .feature { display: flex; align-items: flex-start; gap: 10px; font-size: 13px; line-height: 1.5; }
  .feature .f-check { color: var(--accent); font-size: 14px; margin-top: 1px; flex-shrink: 0; }

  /* Timeline */
  .timeline { display: flex; flex-direction: column; gap: 0; }
  .timeline-item { display: flex; gap: 14px; padding: 12px 0; }
  .timeline-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); margin-top: 5px; flex-shrink: 0; position: relative; }
  .timeline-dot::after { content: ''; position: absolute; top: 10px; left: 3px; width: 2px; height: calc(100% + 16px); background: var(--border); }
  .timeline-item:last-child .timeline-dot::after { display: none; }
  .timeline-day { font-size: 12px; color: var(--accent); font-weight: 600; }
  .timeline-text { font-size: 13px; color: var(--text-muted); }

  /* Testimonials paywall */
  .pw-testimonials { display: flex; flex-direction: column; gap: 10px; }
  .pw-testimonial { background: var(--bg-card); border-radius: 10px; padding: 14px; }
  .pw-testimonial .t-text { font-size: 12px; line-height: 1.55; color: var(--text); opacity: 0.8; font-style: italic; }
  .pw-testimonial .t-author { font-size: 11px; color: var(--text-muted); margin-top: 6px; }

  /* Guarantee */
  .guarantee { text-align: center; padding: 16px; background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); }
  .guarantee .g-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .guarantee .g-text { font-size: 12px; color: var(--text-muted); line-height: 1.5; }

  /* Pay button */
  .pay-btn { background: var(--accent); color: #0a0a14; border: none; padding: 18px; border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s; text-align: center; width: 100%; letter-spacing: 0.3px; }
  .pay-btn:hover { background: var(--accent-bright); transform: translateY(-1px); box-shadow: 0 8px 30px var(--accent-glow); }
  .pay-btn-sub { font-size: 12px; color: var(--text-dim); text-align: center; margin-top: -8px; }

  /* Post-purchase */
  .success-screen { justify-content: center; align-items: center; text-align: center; gap: 24px; padding: 40px 20px; }
  .success-icon { font-size: 64px; animation: successPop 0.5s cubic-bezier(0.68,-0.55,0.27,1.55); }
  @keyframes successPop { from { transform: scale(0); } to { transform: scale(1); } }
  @keyframes ctaPulse { 0%,100% { box-shadow: 0 0 20px rgba(212,165,116,0.2), 0 0 50px rgba(212,165,116,0.08); transform: scale(1); } 50% { box-shadow: 0 0 35px rgba(212,165,116,0.4), 0 0 70px rgba(212,165,116,0.15); transform: scale(1.03); } }
  .success-screen h2 { font-family: 'Instrument Serif', Georgia, serif; font-size: 26px; }
  .success-screen .dl-btn { background: var(--accent); color: #0a0a14; padding: 16px 40px; border-radius: 12px; font-size: 15px; font-weight: 600; text-decoration: none; display: inline-block; transition: all 0.3s; }
  .success-screen .dl-btn:hover { background: var(--accent-bright); }

  /* Legal footer */
  .legal { font-size: 10px; color: var(--text-dim); text-align: center; line-height: 1.5; padding: 16px 0; }
  .legal a { color: var(--text-muted); }

  /* Micro-validation toast */
  #microVal {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: rgba(10,10,20,0.92); border: 1px solid rgba(212,165,116,0.3);
    color: var(--accent); padding: 14px 24px; border-radius: 14px;
    font-size: 13px; font-style: italic; z-index: 150;
    max-width: 320px; width: calc(100% - 48px); text-align: center;
    line-height: 1.5; opacity: 0; transition: opacity 0.3s;
    pointer-events: none; letter-spacing: 0.1px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }
  #microVal.show { opacity: 1; }

  /* Dev toolbar — hidden for production (uncomment display:flex to re-enable) */
  .dev-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.9); border-top: 1px solid var(--border); padding: 8px; z-index: 200; display: none; gap: 6px; overflow-x: auto; flex-wrap: wrap; justify-content: center; }
  .dev-bar button { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-muted); font-size: 10px; padding: 4px 8px; border-radius: 4px; cursor: pointer; white-space: nowrap; }
  .dev-bar button:hover { border-color: var(--accent); color: var(--accent); }
  .dev-bar button.active { background: var(--accent); color: #0a0a14; border-color: var(--accent); }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    .screen { animation: none; }
    .ambient::before { animation: none; }
    .success-icon { animation: none; }
    .option, .gender-card, .interstitial .continue-btn, .pay-btn, .landing .cta-main {
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>

function getAppStoreURL(cppId) {
  const ppid = CPP_PPIDS[cppId] || '';
  return ppid

    : 'https://apps.apple.com/us/app/onera-dream-integration/id6751126653';

// ==================== CPP DATA ====================
const CPP_DATA = {
  'F-1': {
    name: 'Body Disconnection',
    gender: 'F',
    landing: {
      icon: '',
      headline: 'You look in the mirror and the face <em>doesn\'t feel like yours.</em>',

    },
    questions: [
      { id: 'freq', label: 'YOUR REALITY', text: 'How often do you feel like a stranger in your own life?',

function getAutoIcon(label, qId, optIndex) {
  // Try question-specific icons first
  if (qId && QUESTION_ICONS[qId] && QUESTION_ICONS[qId][optIndex] !== undefined) {
    return QUESTION_ICONS[qId][optIndex];
  }
  // Keyword fallback — ordered by specificity (longer matches first)
  const lower = label.toLowerCase();
  const KW = [
    ['every day','calendar-clock'],['every night','moon'],['most of the time','clock'],
    ['nothing yet','circle-dashed'],['push people away','user-minus'],['behind glass','frame'],
    ['wake up','sunrise'],['few times','calendar-range'],['as long as','hourglass'],
    ['watch myself','eye'],['outside','external-link'],['invisible','eye-off'],
    ['nightmare','cloud-lightning'],['dream','sparkles'],['sleep','moon'],['dread','alert-triangle'],
    ['rested','battery-low'],['insomnia','moon-star'],['bedtime','bed-double'],
    ['chest','heart-pulse'],['jaw','lock-keyhole'],['stomach','circle-dot'],['shoulder','move-vertical'],
    ['body','person-standing'],['tension','flame'],['clench','lock'],['breath','wind'],
    ['float','cloud'],['grind','zap'],['nauseous','thermometer'],
    ['numb','snowflake'],['frozen','snowflake'],['robot','cpu'],['autopilot','navigation'],
    ['anxious','alert-circle'],['frustrated','frown'],['unsettled','scan-eye'],
    ['exhausted','battery-low'],['empty','wind'],['flat','minus-square'],['nothing','minus-circle'],
    ['pattern','repeat-2'],['cycle','refresh-cw'],['chameleon','palette'],
    ['mother','heart-handshake'],['father','shield-alert'],['children','baby'],['son','baby'],
    ['unavailable','user-x'],['relationship','heart-crack'],
    ['therapy','message-circle'],['meditation','flower-2'],['journal','book-open'],
    ['self-help','book-open-text'],['breathwork','wind'],['yoga','flower'],['emdr','brain'],
    ['medication','pill'],['coaching','compass'],
    ['year','calendar'],['month','calendar-days'],['life','infinity'],
    ['perform','trophy'],['procrastinat','hourglass'],['sabotag','bomb'],
    ['potential','trending-up'],['brake','octagon'],['blow','flame'],['clockwork','clock'],['30%','gauge'],
    ['release','unlock'],['alive','sun'],['home','home'],['peace','cloud-sun'],['free','bird'],
    ['stop','shield-check'],['terrif','alert-octagon'],['anger','flame'],['silence','volume-x'],
    ['barrier','shield-off'],['fine','check'],['rarely','eye-off'],['sometimes','clock-4'],
    ['smile','drama'],['move through','scroll-text'],['watching','eye'],['script','scroll-text'],
    ['stranger','ghost'],['heavy','weight'],['tired','battery-low'],['normal','help-circle'],
  ];
  for (const [kw, ic] of KW) { if (lower.includes(kw)) return ic; }
  // Per-option-index fallback (vary the shape)
  const fallbacks = ['sparkle','circle-dot','diamond','hexagon','triangle','star'];
  return fallbacks[optIndex % fallbacks.length];
}

    const canvas = document.getElementById('pwParticleCanvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.offsetWidth * 2;
    canvas.height = canvas.offsetHeight * 2;
    ctx.scale(2, 2);
    const W = canvas.offsetWidth, H = canvas.offsetHeight;
    const particles = Array.from({length: 25}, () => ({
      x: Math.random() * W, y: Math.random() * H,
      r: Math.random() * 1.5 + 0.5,
      dx: (Math.random() - 0.5) * 0.2,
      dy: -Math.random() * 0.3 - 0.05,
      o: Math.random() * 0.3 + 0.05,
      color: Math.random() > 0.5 ? 'rgba(212,165,116,' : 'rgba(139,126,200,'
    }));
    function draw() {
      ctx.clearRect(0, 0, W, H);
      particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = p.color + p.o + ')';
        ctx.fill();
        p.x += p.dx; p.y += p.dy;
        p.o += (Math.random() - 0.5) * 0.01;
        p.o = Math.max(0.03, Math.min(0.4, p.o));
        if (p.y < -5) { p.y = H + 5; p.x = Math.random() * W; }
        if (p.x < -5) p.x = W + 5;
        if (p.x > W + 5) p.x = -5;
      });
      requestAnimationFrame(draw);
    }
    draw();
  });
}

function nextStep() {

// ==================== SESSION STORAGE ====================
function saveProgress() {
  try {
    sessionStorage.setItem('onera_quiz', JSON.stringify({
      cpp: currentCPP.id,
      step: currentStep,
      gender: selectedGender,
      answers: answers,
      timestamp: Date.now()
    }));
  } catch(e) {}
}

function restoreProgress() {
  try {
    const saved = sessionStorage.getItem('onera_quiz');
    if (!saved) return false;
    const data = JSON.parse(saved);
    if (Date.now() - data.timestamp > 1800000) return false; // 30 min expiry
    if (!CPP_DATA[data.cpp]) return false;
    currentCPP = CPP_DATA[data.cpp];
    currentCPP.id = data.cpp;
    currentStep = data.step;
    selectedGender = data.gender;
    answers = data.answers || {};
    renderStep();
    return true;
  } catch(e) { return false; }
}

const SUPABASE_FUNCTIONS_URL = 'https://cxtoofvckqllsasriczb.supabase.co/functions/v1';

let selectedPlanType = 'annual';

async function handlePayment() {
  const emailInput = document.getElementById('checkoutEmail');
  const emailError = document.getElementById('emailError');
  const payBtn = document.getElementById('payBtn');
  const email = emailInput ? emailInput.value.trim().toLowerCase() : '';

  // Validate email
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    emailError.style.display = 'block';
    emailInput.style.borderColor = 'var(--red)';
    emailInput.focus();
    return;
  }
  emailError.style.display = 'none';
  emailInput.style.borderColor = 'var(--border-active)';

  // Disable button, show loading
  payBtn.disabled = true;
  payBtn.textContent = 'Redirecting to checkout...';
  payBtn.style.opacity = '0.7';

  try {
    const response = await fetch(`${SUPABASE_FUNCTIONS_URL}/create-quiz-checkout`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email,
        cpp: currentCPP.id || 'F-2',
        gender: selectedGender || currentCPP.gender || 'F',
        quizAnswers: answers,
      }),
    });

    const data = await response.json();

    if (data.url) {
      // Track conversion event
      fbq('track', 'InitiateCheckout', { value: 35, currency: 'USD', content_name: currentCPP.id });
      window.location.href = data.url;
    } else {
      throw new Error(data.error || 'Failed to create checkout');
    }
  } catch (err) {
    console.error('Checkout error:', err);
    payBtn.disabled = false;
    payBtn.textContent = 'Unlock ONERA — $35/year';
    payBtn.style.opacity = '1';
    alert('Something went wrong. Please try again.');
  }
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

function updateTimer() {
  const el = document.getElementById('timerDisplay');
  if (el) el.textContent = formatTime(timerSeconds);
}
